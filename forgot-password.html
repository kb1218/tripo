<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Recovery | Tripo</title>
  <link rel="icon" type="image/svg+xml" href="assets/tripo-logo.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body" data-page="forgot-password">
  <main class="auth-layout">
    <section class="auth-visual">
      <a class="auth-brand" href="index.html">
        <img class="auth-logo" src="assets/tripo-logo.svg" alt="Tripo logo">
        <span>Tripo</span>
      </a>
      <p class="eyebrow">Recovery</p>
      <h1>Recover access without losing control of your account.</h1>
      <p class="auth-copy">Use this page to request a reset email or set a new password after following the recovery link.</p>
    </section>

    <section class="auth-card">
      <div class="auth-card-top">
        <h2>Password reset</h2>
        <p>Request a reset link first, then come back through the email recovery link.</p>
      </div>

      <form id="requestResetForm" class="stack-form">
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <button class="button" type="submit">Send reset link</button>
      </form>

      <form id="updatePasswordForm" class="stack-form" style="display:none; margin-top:18px;">
        <label>
          New password
          <input type="password" name="password" placeholder="Create a new password" minlength="6" required>
        </label>
        <button class="button button-secondary" type="submit">Update password</button>
      </form>

      <p class="auth-footer"><a href="login.html">Back to login</a></p>
      <div id="passwordMessage"></div>
    </section>
  </main>
  <script src="vendor/supabase-js.min.js"></script>
  <script src="config.js"></script>
  <script src="tripo.js"></script>
  <script src="forgot-password.js"></script>
</body>
</html>
